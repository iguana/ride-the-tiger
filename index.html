<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ride The Tiger</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #game-container {
        width: 100%;
        height: 100%;
      }
      canvas {
        display: block;
      }
      #start-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        color: #fff;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        z-index: 1000;
        cursor: pointer;
      }
      #start-screen h1 {
        font-size: 4rem;
        margin-bottom: 1rem;
        text-shadow: 0 0 20px #ff6b35, 0 0 40px #ff6b35;
        color: #ff6b35;
      }
      #start-screen p {
        font-size: 1.5rem;
        opacity: 0.8;
        margin-bottom: 2rem;
      }
      #start-screen .instructions {
        font-size: 1rem;
        opacity: 0.6;
        text-align: center;
        line-height: 1.8;
      }
      #start-screen .click-prompt {
        margin-top: 2rem;
        font-size: 1.2rem;
        animation: pulse 2s infinite;
      }
      #start-screen .hero-image {
        max-width: 400px;
        max-height: 300px;
        width: 80%;
        height: auto;
        object-fit: contain;
        margin-bottom: 1.5rem;
        border-radius: 12px;
        box-shadow: 0 0 40px rgba(255, 107, 53, 0.4);
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
      #hud {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 100;
        display: none;
      }
      #objective {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.7);
        color: #fff;
        padding: 15px 20px;
        border-radius: 8px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        border-left: 4px solid #ff6b35;
      }
      #objective h3 {
        font-size: 0.9rem;
        opacity: 0.7;
        margin-bottom: 5px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      #objective p {
        font-size: 1.1rem;
      }
      #progress {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(0, 0, 0, 0.7);
        color: #4ade80;
        padding: 10px 18px;
        border-radius: 8px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 1rem;
        font-weight: bold;
        border-left: 4px solid #4ade80;
      }
      #kill-count {
        position: absolute;
        top: 70px;
        right: 20px;
        background: rgba(0, 0, 0, 0.7);
        color: #ff6b6b;
        padding: 10px 18px;
        border-radius: 8px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 1rem;
        font-weight: bold;
        border-left: 4px solid #ff6b6b;
      }
      #crosshair {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 20px;
        height: 20px;
      }
      #crosshair::before,
      #crosshair::after {
        content: '';
        position: absolute;
        background: rgba(255, 255, 255, 0.7);
      }
      #crosshair::before {
        width: 2px;
        height: 100%;
        left: 50%;
        transform: translateX(-50%);
      }
      #crosshair::after {
        width: 100%;
        height: 2px;
        top: 50%;
        transform: translateY(-50%);
      }
      #mission-complete {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.9);
        color: #4ade80;
        padding: 40px 60px;
        border-radius: 12px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        text-align: center;
        display: none;
      }
      #mission-complete h2 {
        font-size: 2rem;
        margin-bottom: 10px;
      }
      #mission-complete p {
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <div id="start-screen">
      <h1>RIDE THE TIGER</h1>
      <p>Navigate the corporate jungle</p>
      <div class="instructions">
        <strong>Controls:</strong><br>
        WASD - Move<br>
        Mouse - Look around<br>
        Click - Throw phone<br>
        Shift - Sprint<br>
        M - Toggle music<br>
        ESC - Release cursor
      </div>
      <div class="click-prompt">Click anywhere to start</div>
    </div>
    <div id="hud">
      <div id="objective">
        <h3>Objective</h3>
        <p id="objective-text">Loading...</p>
      </div>
      <div id="progress"></div>
      <div id="kill-count">Managers fired: 0</div>
      <div id="crosshair"></div>
      <div id="mission-complete">
        <h2>CHECKED IN!</h2>
        <p>Department visited!</p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
